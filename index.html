<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AviUtl Script Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1e1e1e; color: #cccccc; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background-color: #252526; width: 260px; border-right: 1px solid #333; }
        .content { background-color: #1e1e1e; flex-grow: 1; }
        .file-item:hover { background-color: #2a2d2e; cursor: pointer; }
        .file-item.active { background-color: #37373d; color: white; }
        .folder-name { color: #858585; font-size: 11px; font-weight: bold; padding: 10px 20px 5px; text-transform: uppercase; }
        .param-card { background-color: #2d2d2d; border: 1px solid #404040; }
        .download-btn { background-color: #0e639c; transition: 0.2s; }
        .download-btn:hover { background-color: #1177bb; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- サイドバー (ファイル階層) -->
    <aside class="sidebar flex flex-col">
        <div class="p-4 text-xs font-bold tracking-widest text-gray-500 border-b border-gray-800">EXPLORER</div>
        <div id="file-tree" class="flex-grow overflow-y-auto pt-2">
            <!-- カテゴリとファイルがここに生成される -->
        </div>
    </aside>

    <!-- メインコンテンツ (詳細表示) -->
    <main class="content flex flex-col p-10 overflow-y-auto">
        <div id="welcome-msg" class="flex flex-col items-center justify-center h-full text-gray-600 text-center">
            <svg class="w-20 h-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p class="text-xl italic">ファイルを選択して詳細を表示</p>
        </div>

        <div id="detail-view" class="hidden">
            <div class="flex items-center gap-4 mb-2">
                <span id="display-category" class="text-blue-400 text-sm font-mono"></span>
                <span class="text-gray-600">/</span>
                <h1 id="display-name" class="text-3xl font-bold text-white"></h1>
            </div>
            <p id="display-file" class="text-gray-500 font-mono text-sm mb-8"></p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div>
                    <h3 class="text-white font-bold mb-4 flex items-center gap-2">
                        <span class="w-1 h-4 bg-blue-500 inline-block"></span> 概要
                    </h3>
                    <p id="display-desc" class="text-gray-300 leading-relaxed mb-8"></p>

                    <h3 class="text-white font-bold mb-4 flex items-center gap-2">
                        <span class="w-1 h-4 bg-blue-500 inline-block"></span> パラメーター設定
                    </h3>
                    <div id="display-params" class="space-y-2">
                        <!-- パラメーターがここに生成される -->
                    </div>
                </div>

                <div class="flex flex-col items-center justify-start pt-10">
                    <div class="param-card p-8 rounded-lg text-center w-full max-w-sm">
                        <p class="text-sm text-gray-400 mb-4">AviUtlのscriptフォルダへ保存してください</p>
                        <a id="download-link" href="#" download class="download-btn text-white font-bold py-3 px-10 rounded shadow-lg inline-flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download .anm
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let scriptData = [];

        async function init() {
            const res = await fetch('scripts.json');
            scriptData = await res.json();
            
            const tree = document.getElementById('file-tree');
            const categories = [...new Set(scriptData.map(s => s.category))];

            tree.innerHTML = categories.map(cat => `
                <div class="folder-section">
                    <div class="folder-name flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path></svg>
                        ${cat}
                    </div>
                    ${scriptData.filter(s => s.category === cat).map(s => `
                        <div class="file-item py-1 px-8 text-sm flex items-center gap-2 transition" onclick="showDetail('${s.file}')">
                            <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"></path></svg>
                            ${s.file}
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showDetail(fileName) {
            const item = scriptData.find(s => s.file === fileName);
            if (!item) return;

            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');

            document.getElementById('display-category').innerText = item.category;
            document.getElementById('display-name').innerText = item.name;
            document.getElementById('display-file').innerText = `Path: script/${item.category}/${item.file}`;
            document.getElementById('display-desc').innerText = item.description;
            
            document.getElementById('display-params').innerHTML = item.params.map(p => `
                <div class="param-card px-4 py-2 rounded text-sm text-gray-300 font-mono">
                    ${p}
                </div>
            `).join('');

            const dlLink = document.getElementById('download-link');
            dlLink.href = `script/${item.category}/${item.file}`;
            
            // アクティブ表示の切り替え
            document.querySelectorAll('.file-item').forEach(el => {
                el.classList.toggle('active', el.innerText.trim() === fileName);
            });
        }

        init();
    </script>
</body>
</html>
